<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Government Scheme Finder</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h1>🇮🇳 AI Government Scheme Finder</h1>

            <p class="subtitle">
                Discover government schemes you're eligible for in seconds.
            </p>

            <form id="schemeForm">

                <div class="input-group">
                    <label>Age</label>
                    <input type="number" id="age" placeholder="Enter your age" required>
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>State</label>
                    <select id="state" required>
                        <option value="">Select State</option>
                        <option>Tamil Nadu</option>
                        <option>Kerala</option>
                        <option>Karnataka</option>
                        <option>Andhra Pradesh</option>
                        <option>Telangana</option>
                        <option>Maharashtra</option>
                        <option>Delhi</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Annual Income (₹)</label>
                    <input type="number" id="income" placeholder="Enter annual income" required>
                </div>

                <div class="input-group">
                    <label>Education</label>
                    <select id="education" required>
                        <option value="">Select Education</option>
                        <option>None</option>
                        <option>10th</option>
                        <option>12th</option>
                        <option>Diploma</option>
                        <option>UG</option>
                        <option>Graduate</option>
                        <option>Post Graduate</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Occupation</label>
                    <select id="occupation" required>
                        <option value="">Select Occupation</option>
                        <option>Student</option>
                        <option>Farmer</option>
                        <option>Self Employed</option>
                        <option>Entrepreneur</option>
                        <option>Laborer</option>
                        <option>Street Vendor</option>
                        <option>Unemployed</option>
                        <option>Government Employee</option>
                        <option>Private Employee</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Caste Category</label>
                    <select id="caste" required>
                        <option value="">Select Category</option>
                        <option>General</option>
                        <option>OBC</option>
                        <option>SC</option>
                        <option>ST</option>
                        <option>Minority</option>
                    </select>
                </div>

                <button type="submit">
                    Find My Schemes 🚀
                </button>

            </form>

            <div id="results"></div>
        

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
